name: Refresh arbitrage CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-arbitrage-csv
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh CSV
        run: |
          python -m poe2_currency refresh \
            --direct-divine-usd 0.05 \
            --scout-kind currency \
            --min-divine 0.01 \
            --limit 0 \
            --out exports/arbitrage.csv

      - name: Commit updated CSV
        run: |
          cp exports/arbitrage.csv /tmp/arbitrage.csv
          git fetch origin main
          git reset --hard origin/main
          mkdir -p exports
          cp /tmp/arbitrage.csv exports/arbitrage.csv
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/arbitrage.csv
          git diff --cached --quiet && exit 0
          git commit -m "Refresh arbitrage CSV"
          git push origin HEAD:main
